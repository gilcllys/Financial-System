name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          missing=0

          check() {
            if [ -z "$1" ]; then
              echo "❌ Missing: $2"
              missing=1
            fi
          }

          echo "🔍 Validating EC2 connection variables..."
          check "${{ vars.EC2_HOST }}"         EC2_HOST
          check "${{ vars.EC2_USER }}"         EC2_USER
          check "${{ vars.EC2_PROJECT_PATH }}" EC2_PROJECT_PATH
          check "${{ secrets.EC2_SSH_KEY }}"   EC2_SSH_KEY

          echo "🔍 Validating application variables..."
          check "${{ vars.DEBUG }}"                    DEBUG
          check "${{ vars.ALLOWED_HOSTS }}"            ALLOWED_HOSTS
          check "${{ vars.CORS_ALLOWED_ORIGINS }}"     CORS_ALLOWED_ORIGINS
          check "${{ vars.KEYCLOAK_SERVER_URL }}"      KEYCLOAK_SERVER_URL
          check "${{ vars.KEYCLOAK_REALM }}"           KEYCLOAK_REALM
          check "${{ vars.KEYCLOAK_CLIENT_ID }}"       KEYCLOAK_CLIENT_ID
          check "${{ vars.KEYCLOAK_VERIFY_SSL }}"      KEYCLOAK_VERIFY_SSL
          check "${{ vars.DB_NAME }}"                  DB_NAME
          check "${{ vars.DB_USERNAME }}"              DB_USERNAME
          check "${{ vars.DB_HOST }}"                  DB_HOST
          check "${{ vars.DB_PORT }}"                  DB_PORT
          check "${{ vars.GUNICORN_WORKERS }}"         GUNICORN_WORKERS
          check "${{ secrets.SECRET_KEY }}"            SECRET_KEY
          check "${{ secrets.DB_PASSWORD }}"           DB_PASSWORD

          if [ $missing -eq 1 ]; then
            echo "🚨 Aborting deploy due to missing variables!"
            exit 1
          fi

          echo "✅ All required variables are set"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "📁 Going to project folder..."
            cd ${{ vars.EC2_PROJECT_PATH }}

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "📝 Creating backend .env file..."
            cat > ./backend/.env << 'ENVEOF'
            DEBUG=${{ vars.DEBUG }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS }}
            CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}
            KEYCLOAK_SERVER_URL=${{ vars.KEYCLOAK_SERVER_URL }}
            KEYCLOAK_REALM=${{ vars.KEYCLOAK_REALM }}
            KEYCLOAK_CLIENT_ID=${{ vars.KEYCLOAK_CLIENT_ID }}
            KEYCLOAK_VERIFY_SSL=${{ vars.KEYCLOAK_VERIFY_SSL }}
            DB_NAME=${{ vars.DB_NAME }}
            DB_USERNAME=${{ vars.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=${{ vars.DB_HOST }}
            DB_PORT=${{ vars.DB_PORT }}
            DB_SSL_MODE=disable
            GUNICORN_WORKERS=${{ vars.GUNICORN_WORKERS }}
            ENVEOF

            echo "🔍 DEBUG - DB_NAME: $(grep DB_NAME ./backend/.env | cut -d= -f2)"
            echo "🔍 DEBUG - DB_PASSWORD first 3 chars: $(grep DB_PASSWORD ./backend/.env | cut -d= -f2 | cut -c1-3)"

            echo "🐳 Rebuilding and restarting containers..."
            docker compose down || true
            docker compose up -d --build

            echo "⏳ Waiting for backend to be healthy..."
            sleep 15
            docker compose ps

            echo "✅ Deploy finished successfully!"
