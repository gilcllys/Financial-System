name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required variables
        run: |
          missing=0

          check() {
            if [ -z "$1" ]; then
              echo "❌ Missing: $2"
              missing=1
            else
              echo "✅ $2"
            fi
          }

          echo "🔍 Validating EC2 connection..."
          check "${{ vars.EC2_HOST }}"         EC2_HOST
          check "${{ vars.EC2_USER }}"         EC2_USER
          check "${{ vars.EC2_PROJECT_PATH }}" EC2_PROJECT_PATH
          check "${{ secrets.EC2_SSH_KEY }}"   EC2_SSH_KEY

          echo ""
          echo "🔍 Validating application variables..."
          check "${{ vars.DEBUG }}"              DEBUG
          check "${{ vars.ALLOWED_HOSTS }}"      ALLOWED_HOSTS
          check "${{ vars.CORS_ALLOWED_ORIGINS }}" CORS_ALLOWED_ORIGINS
          check "${{ vars.KEYCLOAK_SERVER_URL }}"  KEYCLOAK_SERVER_URL
          check "${{ vars.KEYCLOAK_REALM }}"       KEYCLOAK_REALM
          check "${{ vars.KEYCLOAK_CLIENT_ID }}"   KEYCLOAK_CLIENT_ID
          check "${{ vars.KEYCLOAK_VERIFY_SSL }}"  KEYCLOAK_VERIFY_SSL
          check "${{ vars.DB_NAME }}"              DB_NAME
          check "${{ vars.DB_USERNAME }}"          DB_USERNAME
          check "${{ vars.DB_HOST }}"              DB_HOST
          check "${{ vars.DB_PORT }}"              DB_PORT
          check "${{ vars.GUNICORN_WORKERS }}"     GUNICORN_WORKERS

          echo ""
          echo "🔍 Validating secrets..."
          check "${{ secrets.SECRET_KEY }}"   SECRET_KEY
          check "${{ secrets.DB_PASSWORD }}"  DB_PASSWORD

          if [ $missing -eq 1 ]; then
            echo ""
            echo "🚨 Aborting deploy due to missing variables!"
            exit 1
          fi

          echo ""
          echo "✅ All variables and secrets are set"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "📁 Going to project folder..."
            cd ${{ vars.EC2_PROJECT_PATH }}

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "📝 Creating backend .env..."
            printf 'DEBUG=%s\n'                '${{ vars.DEBUG }}'                  >  ./backend/.env
            printf 'SECRET_KEY=%s\n'           '${{ secrets.SECRET_KEY }}'          >> ./backend/.env
            printf 'ALLOWED_HOSTS=%s\n'        '${{ vars.ALLOWED_HOSTS }}'          >> ./backend/.env
            printf 'CORS_ALLOWED_ORIGINS=%s\n' '${{ vars.CORS_ALLOWED_ORIGINS }}'   >> ./backend/.env
            printf 'KEYCLOAK_SERVER_URL=%s\n'  '${{ vars.KEYCLOAK_SERVER_URL }}'    >> ./backend/.env
            printf 'KEYCLOAK_REALM=%s\n'       '${{ vars.KEYCLOAK_REALM }}'         >> ./backend/.env
            printf 'KEYCLOAK_CLIENT_ID=%s\n'   '${{ vars.KEYCLOAK_CLIENT_ID }}'     >> ./backend/.env
            printf 'KEYCLOAK_VERIFY_SSL=%s\n'  '${{ vars.KEYCLOAK_VERIFY_SSL }}'    >> ./backend/.env
            printf 'DB_NAME=%s\n'              '${{ vars.DB_NAME }}'                >> ./backend/.env
            printf 'DB_USERNAME=%s\n'          '${{ vars.DB_USERNAME }}'            >> ./backend/.env
            printf 'DB_PASSWORD=%s\n'          '${{ secrets.DB_PASSWORD }}'         >> ./backend/.env
            printf 'DB_HOST=%s\n'              '${{ vars.DB_HOST }}'                >> ./backend/.env
            printf 'DB_PORT=%s\n'              '${{ vars.DB_PORT }}'                >> ./backend/.env
            printf 'DB_SSL_MODE=disable\n'                                          >> ./backend/.env
            printf 'GUNICORN_WORKERS=%s\n'     '${{ vars.GUNICORN_WORKERS }}'       >> ./backend/.env

            echo "🐳 Starting containers..."
            docker compose up -d --build

            echo "🔄 Reloading host nginx..."
            sudo nginx -t && sudo systemctl reload nginx

            echo "✅ Deploy finished successfully!"
