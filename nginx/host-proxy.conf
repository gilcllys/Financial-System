# /etc/nginx/sites-available/projetos-pessoais
# Gerenciado via Financial-System/nginx/host-proxy.conf
# Setup: scripts/setup-ec2-nginx.sh

# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name ec2-54-147-150-5.compute-1.amazonaws.com 54.147.150.5;
    return 301 https://$host$request_uri;
}

# ─── Keycloak (IAM) — HTTPS :443 ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ec2-54-147-150-5.compute-1.amazonaws.com 54.147.150.5;

    ssl_certificate     /home/ubuntu/identity-and-access-management/certs/fullchain.pem;
    ssl_certificate_key /home/ubuntu/identity-and-access-management/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }
}

# ─── Financial System — HTTPS :4200 ───────────────────────────────────────────
server {
    listen 4200 ssl;
    server_name ec2-54-147-150-5.compute-1.amazonaws.com 54.147.150.5;

    ssl_certificate     /home/ubuntu/identity-and-access-management/certs/fullchain.pem;
    ssl_certificate_key /home/ubuntu/identity-and-access-management/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Django API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Angular SPA
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
