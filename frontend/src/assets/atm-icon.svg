<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Corpo do ATM (azul marinho) -->
  <rect x="1" y="0" width="14" height="16" fill="#1e3a6e"/>

  <!-- Borda superior clara (highlight) -->
  <rect x="1" y="0" width="14" height="1" fill="#3466b8"/>

  <!-- Moldura da tela (escura) -->
  <rect x="2" y="1" width="12" height="6" fill="#0c1e40"/>

  <!-- Tela (verde pixel art) -->
  <rect x="3" y="2" width="10" height="4" fill="#16a34a"/>

  <!-- Linhas de conteúdo na tela -->
  <rect x="4" y="2" width="7" height="1" fill="#4ade80"/>
  <rect x="4" y="4" width="5" height="1" fill="#22c55e"/>

  <!-- Brilho canto superior esquerdo da tela -->
  <rect x="3" y="2" width="2" height="1" fill="#86efac"/>

  <!-- Divisor abaixo da tela -->
  <rect x="1" y="7" width="14" height="1" fill="#0c1e40"/>

  <!-- Teclado numérico — linha 1 (3 botões) -->
  <rect x="2"  y="8" width="3" height="2" fill="#2563eb"/>
  <rect x="6"  y="8" width="3" height="2" fill="#2563eb"/>
  <rect x="10" y="8" width="3" height="2" fill="#2563eb"/>

  <!-- Teclado numérico — linha 2 (3 botões) -->
  <rect x="2"  y="11" width="3" height="2" fill="#2563eb"/>
  <rect x="6"  y="11" width="3" height="2" fill="#2563eb"/>
  <rect x="10" y="11" width="3" height="2" fill="#1d4ed8"/>

  <!-- Botão Enter (destaque verde) -->
  <rect x="10" y="11" width="3" height="2" fill="#15803d"/>

  <!-- Fenda do cartão -->
  <rect x="2" y="14" width="12" height="1" fill="#040c1a"/>
  <rect x="3" y="14" width="10" height="1" fill="#1e3a6e"/>
  <rect x="3" y="14" width="10" height="1" fill="#040c1a" opacity="0.6"/>

  <!-- Dispensador de cédulas (base) -->
  <rect x="1" y="15" width="14" height="1" fill="#040c1a"/>
</svg>
