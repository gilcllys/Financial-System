<div class="flex h-screen bg-black overflow-y-auto">
  <!-- Mobile Overlay -->
  <div
    class="sidenav-overlay"
    [class.active]="isSidenavOpen()"
    (click)="closeSidenav()"
  ></div>

  <!-- Sidenav -->
  <aside
    class="fixed left-0 top-0 h-screen bg-slate-800 border-r border-slate-700 flex flex-col transition-all duration-300 z-50 overflow-y-auto"
    [class.w-64]="isSidenavOpen()"
    [class.w-20]="!isSidenavOpen()"
    [class.open]="isSidenavOpen()"
  >
    <div class="p-6 border-b border-slate-700 flex-shrink-0">
      <div
        class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity"
      >
        <span class="text-3xl">💰</span>
        <span
          class="text-lg font-semibold text-slate-100"
          [class.hidden]="!isSidenavOpen()"
          >FinanceApp</span
        >
      </div>
    </div>

    <nav class="flex-1 py-4 px-2">
      <ul class="space-y-2">
        <li *ngFor="let item of menuItems">
          <button
            type="button"
            (click)="navigateTo(item.route)"
            class="w-full flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-emerald-400 hover:bg-emerald-400/10 transition-all border-l-4 border-transparent rounded-lg"
            [ngClass]="{
              'border-l-emerald-400 text-emerald-400 bg-emerald-400/10':
                isActive(item.route),
            }"
          >
            <mat-icon class="flex-shrink-0">{{ item.icon }}</mat-icon>
            <span
              class="text-sm font-medium whitespace-nowrap"
              [class.hidden]="!isSidenavOpen()"
              >{{ item.label }}</span
            >
          </button>
        </li>
      </ul>
    </nav>

    <div
      class="border-t border-slate-700 p-4 flex flex-col gap-3 flex-shrink-0"
    >
      <button
        type="button"
        class="flex justify-center items-center p-2 rounded-lg text-slate-400 hover:text-emerald-400 hover:bg-emerald-400/10 transition-all"
        title="Configurações"
      >
        <mat-icon>settings</mat-icon>
      </button>

      <div class="flex items-center gap-3" [class.hidden]="!isSidenavOpen()">
        <div
          class="w-10 h-10 rounded-full bg-gradient-to-br from-emerald-400 to-blue-400 flex items-center justify-center text-black text-xs font-bold flex-shrink-0"
        >
          GC
        </div>
        <div class="overflow-hidden min-w-0">
          <p class="text-sm font-semibold text-slate-100 truncate">
            Gilcllys Costa
          </p>
          <p class="text-xs text-slate-500 truncate">
            gilcllys&#64;example.com
          </p>
        </div>
      </div>
    </div>
  </aside>

  <div
    class="flex-1 flex flex-col transition-all duration-300 relative"
    [class.ml-64]="isSidenavOpen() && !isMobile()"
    [class.ml-20]="!isSidenavOpen() && !isMobile()"
  >
    <div class="md:hidden sticky top-4 left-4 z-40 w-fit">
      <button
        type="button"
        (click)="toggleSidenav()"
        class="p-2 rounded-lg text-slate-400 hover:text-emerald-400 hover:bg-slate-800 transition-colors"
      >
        <mat-icon>{{ isSidenavOpen() ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto">
      <router-outlet></router-outlet>
    </div>

    <footer
      class="bg-slate-800 border-t border-slate-700 p-4 mt-auto flex-shrink-0"
    >
      <div class="text-center">
        <p class="text-xs text-slate-500">
          &copy; 2026 Financial App. Desenvolvido por Gilcllys Costa. Todos os
          direitos reservados.
        </p>
      </div>
    </footer>
  </div>
</div>
