<div class="min-h-screen bg-black flex flex-col">
  <div class="flex-1 flex flex-col items-center justify-center px-4 py-8">
    <!-- Logo and Brand -->
    <div class="flex items-center gap-3 mb-8">
    <svg class="w-10 h-10 md:w-12 md:h-12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="6" width="18" height="15" rx="2" fill="#5eead4" opacity="0.8"/>
      <path d="M7 3L17 3C18.1046 3 19 3.89543 19 5L19 6L5 6L5 5C5 3.89543 5.89543 3 7 3Z" fill="#5eead4"/>
      <line x1="3" y1="11" x2="21" y2="11" stroke="#000" stroke-width="1.5"/>
    </svg>
    <h2 class="text-white text-xl md:text-2xl font-bold">FinanceApp</h2>
  </div>

  <!-- Register Card -->
  <div class="w-full max-w-sm md:max-w-md bg-[#0c1e33] rounded-2xl shadow-2xl p-6 md:p-8 lg:p-10">
    <!-- Header -->
    <div class="text-center mb-6 md:mb-8">
      <h1 class="text-white text-2xl md:text-3xl font-bold mb-2">
        Crie sua Conta
      </h1>
      <p class="text-slate-400 text-sm md:text-base">
        Comece a gerenciar suas finanças hoje.
      </p>
    </div>

    <form
      class="flex flex-col gap-4 md:gap-5"
      [formGroup]="registerForm"
      (ngSubmit)="onSubmit()"
    >
      <!-- Full Name Field -->
      <mat-form-field appearance="outline" class="w-full custom-field">
        <input
          matInput
          placeholder="Nome Completo"
          formControlName="fullName"
          type="text"
          class="text-white"
        />
      </mat-form-field>

      <!-- Email Field -->
      <mat-form-field appearance="outline" class="w-full custom-field">
        <input
          matInput
          placeholder="Email"
          formControlName="email"
          type="email"
          class="text-white"
        />
      </mat-form-field>

      <!-- Password Field -->
      <mat-form-field appearance="outline" class="w-full custom-field">
        <input
          matInput
          type="password"
          placeholder="Senha"
          formControlName="userPassword"
          autocomplete="new-password"
          class="text-white"
        />
      </mat-form-field>

      <!-- Confirm Password Field -->
      <mat-form-field appearance="outline" class="w-full custom-field">
        <input
          matInput
          type="password"
          placeholder="Confirmar Senha"
          formControlName="confirmPassword"
          autocomplete="new-password"
          class="text-white"
        />
      </mat-form-field>

      <!-- Loading Spinner or Sign Up Button -->
      @if (isLoading()) {
        <div class="flex justify-center py-3">
          <mat-spinner diameter="40"></mat-spinner>
        </div>
      } @else {
        <button
          type="submit"
          [disabled]="registerForm.invalid"
          class="w-full h-12 md:h-14 bg-[#5eead4] hover:bg-[#4dd4bd] text-black font-bold text-base md:text-lg rounded-lg transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed mt-2"
        >
          Cadastrar
        </button>
      }

      <!-- Footer Link -->
      <div class="text-center text-xs md:text-sm pt-2">
        <span class="text-slate-400">Já tem uma conta?</span>
        <a
          [routerLink]="['/']"
          class="text-[#5eead4] font-semibold hover:text-[#4dd4bd] transition-colors ml-1"
        >
          Entre
        </a>
      </div>
    </form>
  </div>
  </div>

  <!-- Footer -->
  <footer class="w-full border-t border-[#334155] py-8">
    <div class="text-center text-xs text-[#64748b]">
      <p>
        &copy; 2026 Financial App. Desenvolvido por Gilcllys Costa. Todos os
        direitos reservados.
      </p>
    </div>
  </footer>
</div>
