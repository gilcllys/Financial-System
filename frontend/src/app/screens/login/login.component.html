<div class="min-h-screen bg-black flex flex-col">
  <div class="flex-1 flex flex-col items-center justify-center px-4 py-8">
    <!-- Logo Icon -->
    <div class="mb-6">
      <svg
        class="w-12 h-12 md:w-14 md:h-14"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect
          x="3"
          y="6"
          width="18"
          height="15"
          rx="2"
          fill="#5eead4"
          opacity="0.8"
        />
        <path
          d="M7 3L17 3C18.1046 3 19 3.89543 19 5L19 6L5 6L5 5C5 3.89543 5.89543 3 7 3Z"
          fill="#5eead4"
        />
        <line x1="3" y1="11" x2="21" y2="11" stroke="#000" stroke-width="1.5" />
      </svg>
    </div>

    <!-- Welcome Title -->
    <h1
      class="text-white text-2xl md:text-3xl lg:text-4xl font-bold mb-8 md:mb-10 text-center"
    >
      Bem-vindo de Volta!
    </h1>

    <!-- Login Card -->
    <div
      class="w-full max-w-sm md:max-w-md bg-[#0c1e33] rounded-2xl shadow-2xl p-6 md:p-8 lg:p-10"
    >
      <form
        class="flex flex-col gap-5 md:gap-6"
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()"
      >
        <!-- Email Field -->
        <mat-form-field appearance="outline" class="w-full custom-field">
          <input
            matInput
            placeholder="Email"
            formControlName="email"
            type="email"
            class="text-white"
          />
        </mat-form-field>

        <!-- Password Field -->
        <mat-form-field appearance="outline" class="w-full custom-field">
          <input
            matInput
            type="password"
            placeholder="Senha"
            formControlName="userPassword"
            autocomplete="current-password"
            class="text-white"
          />
        </mat-form-field>

        <!-- Loading Spinner or Login Button -->
        @if (isLoading) {
        <div class="flex justify-center py-3">
          <mat-spinner diameter="40"></mat-spinner>
        </div>
        } @else {
        <button
          type="submit"
          [disabled]="loginForm.invalid"
          class="w-full h-12 md:h-14 bg-[#5eead4] hover:bg-[#4dd4bd] text-black font-bold text-base md:text-lg rounded-lg transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed mt-2"
        >
          Login
        </button>
        }

        <!-- Footer Links -->
        <div
          class="flex flex-col sm:flex-row justify-between items-center gap-3 sm:gap-4 text-xs md:text-sm pt-2"
        >
          <a
            href="#"
            class="text-slate-400 hover:text-[#5eead4] transition-colors"
          >
            Esqueceu a senha?
          </a>
          <div class="text-slate-400">
            Não tem uma conta?
            <a
              [routerLink]="['/register']"
              class="text-[#5eead4] font-semibold hover:text-[#4dd4bd] transition-colors ml-1"
            >
              Cadastre-se
            </a>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="w-full border-t border-[#334155] py-8">
    <div class="text-center text-xs text-[#64748b]">
      <p>
        &copy; 2026 Financial App. Desenvolvido por Gilcllys Costa. Todos os
        direitos reservados.
      </p>
    </div>
  </footer>
</div>
