server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash no nome
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para o index.html (garante que o app atualiza)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
