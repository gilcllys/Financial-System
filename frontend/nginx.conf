server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # [SEC-A05] Security headers
    add_header X-Content-Type-Options    "nosniff"                          always;
    # SAMEORIGIN permite que o Keycloak carregue o silent-check-sso.html em iframe
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Content-Security-Policy
      "default-src 'self'; \
       script-src 'self' 'unsafe-inline'; \
       style-src 'self' 'unsafe-inline'; \
       img-src 'self' data:; \
       font-src 'self'; \
       connect-src 'self' https://ec2-54-147-150-5.compute-1.amazonaws.com https://ec2-54-147-150-5.compute-1.amazonaws.com:4200; \
       frame-src 'self' https://ec2-54-147-150-5.compute-1.amazonaws.com; \
       frame-ancestors 'self' https://ec2-54-147-150-5.compute-1.amazonaws.com; \
       object-src 'none'; \
       base-uri 'self';"
      always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Angular SPA — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # silent-check-sso precisa ser acessível sem restrições de frame
    location = /silent-check-sso.html {
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://ec2-54-147-150-5.compute-1.amazonaws.com;" always;
        try_files $uri =404;
    }

    # Cache longo para assets com hash no nome
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para o index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    server_tokens off;
}
