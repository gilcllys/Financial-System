server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # [SEC-A05] Security headers — defense-in-depth no nível do reverse proxy
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "DENY"                             always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    # Remova 'unsafe-inline' em style-src assim que possível (requer refactor Angular)
    add_header Content-Security-Policy
      "default-src 'self'; \
       script-src 'self'; \
       style-src 'self' 'unsafe-inline'; \
       img-src 'self' data:; \
       font-src 'self'; \
       connect-src 'self' https://ec2-54-147-150-5.compute-1.amazonaws.com; \
       frame-src 'none'; \
       object-src 'none'; \
       base-uri 'self';"
      always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Angular SPA — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash no nome
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para o index.html (garante que o app atualiza)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # [SEC-A05] Esconde versão do Nginx
    server_tokens off;
}
