services:

  # ─── Banco de Dados ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: financial_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financial_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend (Django) ──────────────────────────────────────────────────────
  backend:
    build: ./backend
    command: >
      sh -c "python financial_system/manage.py migrate --noinput &&
             python financial_system/manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.local
    environment:
      # Keycloak hospedado no EC2 (acessível tanto pelo backend quanto pelo browser)
      KEYCLOAK_SERVER_URL: https://ec2-54-147-150-5.compute-1.amazonaws.com
      KEYCLOAK_REALM: projetos-pessoais
      KEYCLOAK_CLIENT_ID: financial-frontend
      DB_HOST: db
      DB_SSL_MODE: disable
    depends_on:
      db:
        condition: service_healthy

  # ─── Frontend (Angular + Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
