services:

  # ─── Banco de Dados ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: financial_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # [SEC-A05] Porta 5432 NÃO exposta ao host — acesso apenas via rede interna Docker.
    # Em dev local, descomente SOMENTE se precisar de acesso direto ao banco:
    # ports:
    #   - "127.0.0.1:5432:5432"   # bind em loopback, NUNCA em 0.0.0.0
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financial_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ─── Backend (Django + Gunicorn) ───────────────────────────────────────────
  backend:
    build: ./backend
    # Roda migrate e em seguida sobe o Gunicorn (mesmo CMD do Dockerfile,
    # mas precedido do migrate para garantir schema atualizado no deploy).
    command: >
      sh -c "python financial_system/manage.py migrate --noinput &&
             gunicorn
             --bind 0.0.0.0:8080
             --workers $${GUNICORN_WORKERS:-3}
             --worker-class sync
             --worker-connections 1000
             --timeout 30
             --keepalive 5
             --max-requests 1000
             --max-requests-jitter 100
             --pythonpath financial_system
             --access-logfile -
             --error-logfile -
             financial_system.wsgi:application"
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      # Keycloak hospedado no EC2 (acessível tanto pelo backend quanto pelo browser)
      KEYCLOAK_SERVER_URL: https://ec2-54-147-150-5.compute-1.amazonaws.com
      KEYCLOAK_REALM: projetos-pessoais
      KEYCLOAK_CLIENT_ID: financial-frontend
      DB_HOST: db
      DB_SSL_MODE: disable
      # Workers: t3.micro (1 vCPU) → 3; t3.small (2 vCPU) → 5
      GUNICORN_WORKERS: "3"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # [SEC-A05] Healthcheck do backend — verifica se o Gunicorn está respondendo
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 400M
        reservations:
          memory: 200M

  # ─── Frontend (Angular + Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    healthcheck:
      # [SEC-A05] Healthcheck do frontend — verifica se o Nginx está servindo
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 100M
        reservations:
          memory: 32M

volumes:
  pgdata:
